name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: uv build

      - name: Validate metadata
        run: uvx twine check dist/*

      - name: Verify tag matches package version
        id: meta
        run: |
          VERSION="$(uv run python -c 'import triflow; print(triflow.__version__)')"
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$TAG" ]; then
            echo "tag $TAG does not match package version $VERSION" >&2
            exit 1
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    needs: build
    runs-on: ubuntu-latest
    # Dormant until PyPI Trusted Publishing is configured for this repo and the
    # PYPI_ENABLED repo variable is set to "true". See docs/installation.md.
    if: vars.PYPI_ENABLED == 'true'
    environment: pypi
    permissions:
      id-token: write # OIDC for PyPI Trusted Publishing — no token stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
